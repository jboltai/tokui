<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokUI · Modern 主题验证</title>
  <link rel="stylesheet" href="../dist/tokui.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; background: #f6f6f7; color: #18181b; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(9,9,11,0.08);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .topbar h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
    .topbar .sub { font-size: 13px; color: #71717a; }
    .topbar .pill { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: #f4f4f5; color: #52525b; border: 1px solid rgba(9,9,11,0.06); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 53px); }
    .pane { padding: 28px 28px 60px; border-right: 1px solid rgba(9,9,11,0.08); }
    .pane:last-child { border-right: none; }
    .pane.light { background: #F3F4F6; }
    .pane.dark { background: #131316; }
    .pane-label { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #71717a; margin-bottom: 4px; }
    .pane.dark .pane-label { color: #A1A1A7; }
    .pane-label .dot { width: 8px; height: 8px; border-radius: 50%; background: #3b6ff5; }
    .pane-title { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; color: #18181b; }
    .pane.dark .pane-title { color: #FCFCFC; }
    .pane-desc { font-size: 13px; color: #71717a; margin: 0 0 24px; }
    .pane.dark .pane-desc { color: #A1A1A7; }
    .tokui-host { max-width: 640px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>TokUI · Modern 主题</h1>
    <span class="sub">new TokUI({ theme: 'modern' }) / 'modern-dark' — 与 default 并存</span>
    <span class="pill">data-tokui-theme="modern"</span>
    <span class="pill">data-tokui-theme="modern-dark"</span>
  </div>

  <div class="grid">
    <section class="pane light">
      <div class="pane-label"><span class="dot"></span> MODERN · LIGHT</div>
      <h2 class="pane-title">Modern 亮色</h2>
      <p class="pane-desc">data-tokui-theme="modern"</p>
      <div class="tokui-host" id="host-light"></div>
    </section>
    <section class="pane dark">
      <div class="pane-label"><span class="dot"></span> MODERN · DARK</div>
      <h2 class="pane-title">Modern 暗色</h2>
      <p class="pane-desc">data-tokui-theme="modern-dark"</p>
      <div class="tokui-host" id="host-dark"></div>
    </section>
  </div>

  <script src="../dist/tokui.umd.js"></script>
  <script>
    'use strict';
    var DSL = [
      '[h3 tt:"按钮 Button"]',
      '[btn tx:"主要" v:primary] [btn tx:"默认"] [btn tx:"幽灵" v:ghost] [btn tx:"成功" v:success] [btn tx:"危险" v:danger]',
      '[btn tx:"胶囊" v:pill] [btn tx:"方块" v:square]',
      '[btn tx:"小" v:sm] [btn tx:"默认"] [btn tx:"大" v:lg] [btn tx:"块级" v:block]',
      '',
      '[dv]',
      '',
      '[h3 tt:"卡片 + 表单"]',
      '[card tt:"用户信息"]',
      '  [input l:"姓名" ph:"请输入姓名" req]',
      '  [select l:"部门"]',
      '    [opt 技术部]',
      '    [opt 市场部]',
      '  [/select]',
      '  [picker l:"所在城市" ph:"请选择城市"]',
      '    [opt v:bj tx:"北京"]',
      '    [opt v:sh tx:"上海" chk]',
      '    [opt v:sz tx:"深圳"]',
      '  [/picker]',
      '  [textarea l:"个人简介" ph:"请简单介绍自己" rows:3][/textarea]',
      '  [radio l:"性别"]',
      '    [opt 男]',
      '    [opt 女 chk]',
      '  [/radio]',
      '  [checkbox l:"订阅每周精选" chk]',
      '  [ft v:right]',
      '    [btn tx:"提交" v:primary]',
      '    [btn tx:"取消"]',
      '  [/ft]',
      '[/card]',
      '',
      '[card tt:"更多表单组件"]',
      '  [numinput l:"购买数量" v:1 min:1 max:99 step:1]',
      '  [rate l:"商品评分" v:4 max:5]',
      '  [slider l:"不透明度" v:60 min:0 max:100]',
      '  [input-tag l:"技术栈" tags:"JavaScript,Python,Go" ph:"输入后回车添加" max:8]',
      '  [cascader l:"所在地区" ph:"请选择省/市/区"]',
      '    [opt v:gd tx:"广东"]',
      '    [opt v:gz tx:"广州" p:gd]',
      '    [opt v:sz tx:"深圳" p:gd]',
      '    [opt v:zj tx:"浙江"]',
      '    [opt v:hz tx:"杭州" p:zj]',
      '  [/cascader]',
      '  [datepicker l:"入职日期" ph:"请选择日期" fmt:yyyy-MM-dd]',
      '[/card]',
      '',
      '[card tt:"输入框变体 Input Variants"]',
      '  [input l:"默认 default" ph:"标准四边输入框"]',
      '  [input l:"下划线 underline" v:underline ph:"v:underline 仅下边框"]',
      '  [input l:"圆角胶囊 pill" v:pill ph:"v:pill"]',
      '[/card]',
      '',
      '[card tt:"输入框组 InputGroup"]',
      '  [input l:"手机号" pre:"+86" ph:"请输入手机号"]',
      '  [input l:"网址" pre:"https://" app:".com" ph:"example.com"]',
      '  [input l:"金额" t:number app:"元" ph:"0.00"]',
      '  [input l:"邮箱" pre:"✉" appbtn:"发送验证码|success" ph:"name@mail.com"]',
      '  [input l:"搜索" appbtn:"搜索|primary" ph:"输入关键词"]',
      '  [input v:pill l:"药丸搜索" pre:"🔍" appbtn:"Go|primary" ph:"pill group"]',
      '[/card]',
      '',
      '[h3 tt:"表格 Table"]',
      '[table stripe]',
      '  [thead cols:"姓名,年龄,城市,状态"]',
      '  [tbody]',
      '    [tr 张三,25,北京,在职]',
      '    [tr 李四,30,上海,在职]',
      '    [tr 王五,28,深圳,休假]',
      '  [/tbody]',
      '[/table]',
      '',
      '[h3 tt:"标签 / 状态 / 开关"]',
      '[tag t:primary tx:"主要"] [tag t:success tx:"成功"] [tag t:warning tx:"警告"] [tag t:danger tx:"危险"]',
      '[switch l:"通知推送" chk] [switch l:"夜间模式"]',
      '[dot t:success tx:"在线"] [dot t:warning tx:"离开"] [dot t:danger tx:"忙碌"]',
      '',
      '[h3 tt:"提示框 Callout"]',
      '[callout t:info tt:"提示" tx:"信息提示"]',
      '[callout t:success tt:"成功" tx:"操作完成"]',
      '[callout t:warning tt:"警告" tx:"请检查输入"]',
      '[callout t:danger tt:"错误" tx:"提交失败"]',
      '',
      '[h3 tt:"导航 / 代码"]',
      '[breadcrumb items:"首页,产品,详情"]',
      '[pagination page:3 total:10]',
      '[code lang:js]const add = (a, b) => a + b;[/code]',
      '',

      '[dv]',
      '[h3 tt:"导航扩展 · tabs / accordion / steps / timeline"]',
      '[tabs]',
      '  [tab tt:"概览"]',
      '  [p 标签页内容 A — Modern 下划线指示条风格。]',
      '  [/tab]',
      '  [tab tt:"详情"]',
      '  [p 标签页内容 B。]',
      '  [/tab]',
      '  [tab tt:"设置"]',
      '  [p 标签页内容 C。]',
      '  [/tab]',
      '[/tabs]',
      '[accordion]',
      '  [collapse tt:"什么是 TokUI？"]',
      '  [p 零依赖的流式 UI 描述与渲染框架。]',
      '  [/collapse]',
      '  [collapse tt:"支持主题切换吗？"]',
      '  [p 支持 default / dark / modern / modern-dark 多主题。]',
      '  [/collapse]',
      '[/accordion]',
      '[steps]',
      '  [step tx:"需求评审" t:done]',
      '  [step tx:"开发实现" t:done]',
      '  [step tx:"测试验证" t:active]',
      '  [step tx:"发布上线"]',
      '[/steps]',
      '[timeline]',
      '  [ti tt:"部署 v2.3.0 → 生产" n:success]',
      '  [ti tt:"修复分页 Bug" n:danger]',
      '  [ti tt:"新增 modern 主题" n:primary]',
      '  [ti tt:"优化首屏加载" n:warning]',
      '[/timeline]',
      '',

      '[h3 tt:"反馈 · progress / spin / stat / badge / dot / avatar"]',
      '[progress v:72 tx:"前端开发"]',
      '[progress v:45 tx:"后端接口" status:success]',
      '[progress v:30 tx:"测试覆盖" status:error]',
      '[progress v:80 t:circle]',
      '[spin tx:"加载中..."]',
      '[stat v:1284 tt:"总访问" n:primary icon:↑]',
      '[stat v:98.6 tt:"可用率" n:success icon:%]',
      '[badge t:primary tx:"主要"] [badge t:success tx:"成功"] [badge t:warning tx:"警告"] [badge t:danger tx:"危险"] [badge dot t:danger]',
      '[avatar tx:"AI" size:md] [avatar tx:"U" size:md] [avatar tx:"OK" size:md]',
      '',

      '[h3 tt:"AI 对话 · bubble / agent / tool-call / think"]',
      '[bubble role:user model:"我" time:"刚刚"]你好，帮我分析数据[/bubble]',
      '[bubble role:ai model:"TokUI" time:"刚刚"]好的，正在为你处理。[/bubble]',
      '[agent name:"data-analyst" status:running action:"读取数据集" duration:"3.2s"]',
      '[tool-call name:"query_db" status:done duration:"120ms"]成功返回 128 行记录[/tool-call]',
      '[think tt:"思考过程"]',
      '  [p 先聚合再排序，最后取 Top10。]',
      '[/think]',
      '[think-chain tt:"推理链" status:running]',
      '  [think-step status:done tt:"理解问题" dur:"0.3s"]',
      '  [think-step status:running tt:"检索知识库" dur:"1.1s"]',
      '  [think-step status:pending tt:"生成回答"][/think-step]',
      '[/think-chain]',
      '',

      '[h3 tt:"输入 · chat-input / quick-reply / suggestion / quote"]',
      '[chat-input ph:"输入消息，回车发送..." max:500][/chat-input]',
      '[quick-reply items:"解释这段代码,生成测试用例,优化性能,添加注释"][/quick-reply]',
      '[suggestions cols:2]',
      '  [suggestion tt:"撰写周报" tx:"生成本周工作总结" icon:📝]',
      '  [suggestion tt:"数据分析" tx:"对上传的数据做透视" icon:📊]',
      '  [suggestion tt:"代码审查" tx:"检查潜在问题与改进点" icon:🔍]',
      '  [suggestion tt:"翻译文档" tx:"中英互译并保持格式" icon:🌐]',
      '[/suggestions]',
      '[quote role:"用户"]请用 Modern 风格重新梳理 modern 主题[/quote]',
      '',

      '[h3 tt:"Markdown"]',
      '[md]支持 **加粗**、*斜体*、`行内 code`、[链接](https://jboltai.com) 与引用：[/md]',
      ''
    ].join('\n');

    // 用 theme 参数实例化，验证 data-tokui-theme 正式生效
    new TokUI.TokUI({ container: document.getElementById('host-light'), theme: 'modern' }).render(DSL);
    new TokUI.TokUI({ container: document.getElementById('host-dark'), theme: 'modern-dark' }).render(DSL);
  </script>
</body>
</html>
