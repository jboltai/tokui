name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        # 用 @v6：跑 Node 24 runtime，消除 Node 20 弃用警告（@v4 跑 Node 20，GitHub 2026-06-02 起强制升 24）。
        # issue #261（Windows 路径含空格）本仓 ubuntu-latest 不受影响。
        # standalone:true 绕过 @v6 默认 self-installer 的 lockfile 读取（pnpm 11.12.0 integrity bug）；
        # version 钉 11.7.0 避免 "Checking for updates" 升级触发该路径。详见 release.yml。
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          standalone: true

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npm run typecheck

      - name: Run full test suite
        run: npm run test:all

      - name: Build library (ESM + UMD + CJS + CSS)
        run: npm run build

      - name: Verify build artifacts (smoke import)
        run: |
          node --input-type=module -e "import('./dist/tokui.mjs').then(m=>{ if(!m.TokUI && !(m.default&&m.default.TokUI)) throw new Error('ESM TokUI missing'); console.log('ESM OK'); })"
          node -e "const m=require('./dist/tokui.cjs'); if(!m.TokUI) throw new Error('CJS TokUI missing'); console.log('CJS OK');"
