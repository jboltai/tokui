name: Release

# 打 v* 标签时触发：构建并发布到 npm（带 provenance）。
# 需要 repo secret: NPM_TOKEN（npm 自动化 token，支持 publish）。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # npm publish --provenance 必需

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        # 用 @v6：跑 Node 24 runtime，消除 Node 20 弃用警告（@v4 跑 Node 20，GitHub 2026-06-02 起强制升 24）。
        # issue #261（Windows 路径含空格）本仓 ubuntu-latest 不受影响。
        # standalone:true 走独立安装器（直下载 pnpm 二进制），绕过 @v6 默认 self-installer
        # 的 npm-based lockfile 读取——pnpm 11.12.0 在 createFullPkgId 处遇缺 integrity 字段会崩
        # （"Cannot use 'in' operator to search for 'integrity' in undefined"）。
        # version 精确钉 11.7.0：避免 action "Checking for updates" 把 11.7→11.12 升级触发该路径。
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          standalone: true

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: npm run build

      - name: Verify (typecheck + tests + smoke import)
        run: |
          npm run typecheck
          npm run test:all
          node --input-type=module -e "import('./dist/tokui.mjs').then(m=>{ if(!m.TokUI && !(m.default&&m.default.TokUI)) throw new Error('ESM TokUI missing'); })"

      - name: Publish all workspace packages
        # -r 递归发布 monorepo 全部包；--no-git-checks 允许在脏工作区发布；
        # workspace:^ 会被 pnpm 自动改写为 ^0.x.0；provenance 由 publishConfig 开启。
        run: pnpm publish -r --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
